  <path d="M745 500
           C815 545 820 670 695 810
           L695 640
           C695 585 665 555 605 582
           C635 508 704 480 745 500 Z"
        fill="url(#greenGrad)"/>

  <!-- center child -->
  <path d="M510 640
           C510 590 548 560 595 585
           C605 590 615 590 625 585
           C672 560 710 590 710 640
           C710 670 690 688 676 700
