  <path d="M579 192 C577 237 585 268 603 296" fill="none" stroke="#E8F3A8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M760 306 C720 312 688 317 662 326" fill="none" stroke="#E8F3A8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

</svg>