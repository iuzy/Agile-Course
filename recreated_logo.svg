  <!-- heads -->
  <circle cx="420" cy="420" r="58" fill="url(#blueGrad)"/>
  <circle cx="780" cy="420" r="58" fill="url(#greenGrad)"/>
  <circle cx="600" cy="560" r="62" fill="url(#orangeGrad)"/>

  <!-- sprout stem -->
  <path d="M600 450 C600 395 618 350 654 318" fill="none" stroke="#B7C800" stroke-width="9" stroke-linecap="round"/>

  <!-- leaves -->
  <path d="M595 305
